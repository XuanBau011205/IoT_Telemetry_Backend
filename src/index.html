<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Telemetry Control - Vanilla JS</title>

    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#060E1A',
                        cardBg: 'rgba(15,23,42,0.92)',
                        staleBg: 'rgba(15,23,42,0.65)'
                    },
                    fontFamily: { sans: ['Barlow', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        body { background: radial-gradient(ellipse 80% 55% at 50% -5%, rgba(10,37,64,0.85) 0%, #060E1A 65%); color: #F1F5F9; min-height: 100vh; }
        @keyframes iotping { 0% { transform: scale(1); opacity: .75; } 100% { transform: scale(2.6); opacity: 0; } }
        .animate-iotping { animation: iotping 1.4s ease infinite; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 99px; }
    </style>
</head>
<body class="p-4 sm:p-6 font-sans">
    
    <div class="max-w-6xl mx-auto">
        <div class="flex flex-wrap items-center justify-between gap-3 bg-[rgba(10,37,64,0.95)] rounded-2xl border border-white/10 p-4 sm:px-6 shadow-[0_4px_24px_rgba(0,0,0,0.5)] mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-gradient-to-br from-emerald-500 to-sky-500 shadow-[0_0_20px_rgba(16,185,129,0.35)]">
                    <i data-lucide="radio" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-sm font-black text-slate-100 tracking-tight">IoT TELEMETRY CONTROL</h1>
                    <p class="text-[10px] tracking-[0.14em] uppercase text-slate-400">Infrastructure Monitoring · Real-Time</p>
                </div>
            </div>
            <div class="flex items-center gap-3 flex-wrap">
                <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                    <i data-lucide="server" class="w-3.5 h-3.5 text-emerald-500"></i>
                    <span class="text-xs font-black text-emerald-500 font-mono" id="kpi-online">0/0</span>
                </div>
                <div id="kpi-health-box" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
                    <i data-lucide="check-circle-2" id="kpi-health-icon" class="w-3.5 h-3.5 text-emerald-500"></i>
                    <span class="text-xs font-black text-emerald-500 font-mono" id="kpi-health">HEALTHY</span>
                </div>
                <div class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg bg-white/5 border border-white/10">
                    <i data-lucide="refresh-cw" class="w-3 h-3 text-slate-400"></i>
                    <span class="text-[10px] text-slate-400 font-mono" id="kpi-time">—</span>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-1.5 mb-3">
            <i data-lucide="activity" class="w-3 h-3 text-slate-400"></i>
            <span class="text-[9px] font-bold tracking-[0.16em] uppercase text-slate-400">Sensor Nodes</span>
        </div>
        
        <div id="device-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            </div>

        <div class="flex items-center gap-1.5 mb-3">
            <i data-lucide="bar-chart-3" class="w-3 h-3 text-slate-400"></i>
            <span class="text-[9px] font-bold tracking-[0.16em] uppercase text-slate-400">Historical Trends</span>
        </div>
        
        <div class="bg-cardBg rounded-2xl p-5 border border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.4)]">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2.5">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-emerald-500/10 border border-emerald-500/30">
                        <i data-lucide="line-chart" class="w-4 h-4 text-emerald-500"></i>
                    </div>
                    <div>
                        <p class="text-[13px] font-black text-slate-200">Temperature Trends</p>
                        <p class="text-[10px] text-slate-400">Rolling 40-tick window · All nodes</p>
                    </div>
                </div>
                <span class="text-[10px] font-bold tracking-widest px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-500 border border-emerald-500/20">LIVE</span>
            </div>
            <div class="relative h-[250px] w-full">
                <canvas id="telemetryChart"></canvas>
            </div>
        </div>
        
        <p class="text-center mt-6 text-[9px] tracking-[0.18em] uppercase text-slate-600">
            IoT Telemetry Control · Vanilla JS Edition
        </p>
    </div>

    <script>
        /* ── CONSTANTS ── */
        const NODE_IDS = ["Node_01", "Node_02", "Node_03", "Node_04", "Node_05", "Node_06"];
        const COLORS = { Node_01: "#10B981", Node_02: "#3B82F6", Node_03: "#F59E0B", Node_04: "#EC4899", Node_05: "#818CF8", Node_06: "#06B6D4" };
        const HISTORY_WINDOW = 40;
        const STALE_THRESHOLD_MS = 60000;

        /* ── STATE ── */
        const latestData = {};
        const buffer = {};
        
        // Dữ liệu mô phỏng
        const seq = Object.fromEntries(NODE_IDS.map(id => [id, 0]));
        const bases = Object.fromEntries(NODE_IDS.map((id, i) => [id, 21 + i * 1.8]));

        function gen(nodeId) {
            seq[nodeId]++;
            bases[nodeId] = Math.max(15, Math.min(45, bases[nodeId] + (Math.random() - 0.5) * 0.6));
            return {
                nodeId,
                sequenceNumber: seq[nodeId],
                temperature: +(bases[nodeId].toFixed(2)),
                humidity: +(50 + Math.sin(Date.now() / 8000 + NODE_IDS.indexOf(nodeId)) * 18).toFixed(2),
                adcRaw: Math.floor(1700 + Math.random() * 600),
                windowAvgTemperature: +(bases[nodeId] + (Math.random() - 0.5) * 0.4).toFixed(2),
                receivedAt: new Date().toISOString()
            };
        }

        /* ── CHART.JS SETUP ── */
        const ctx = document.getElementById('telemetryChart').getContext('2d');
        const datasets = NODE_IDS.map(id => ({
            label: id,
            data: [],
            borderColor: COLORS[id],
            borderWidth: 2,
            pointRadius: 0,
            pointHoverRadius: 4,
            tension: 0.4 // Làm mượt đường cong
        }));

        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, // Tắt animation để tối ưu realtime
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { labels: { color: '#64748B', boxWidth: 8, font: { size: 10 } } },
                    tooltip: { backgroundColor: '#0C1426', titleColor: '#64748B', bodyColor: '#F1F5F9', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 }
                },
                scales: {
                    x: { grid: { display: false, drawBorder: false }, ticks: { color: '#475569', font: { size: 9, family: 'monospace' } } },
                    y: { grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }, ticks: { color: '#475569', font: { size: 9, family: 'monospace' }, callback: val => val + '°' } }
                }
            }
        });

        /* ── HELPER FUNCTIONS ── */
        const isStale = (iso) => Date.now() - new Date(iso).getTime() > STALE_THRESHOLD_MS;
        const fmtTime = (iso) => new Date(iso).toLocaleTimeString("en-US", { hour12: false });
        const getStatus = (t) => t > 38 ? { l: "CRITICAL", c: "#EF4444" } : t > 32 ? { l: "WARN", c: "#F59E0B" } : { l: "NOMINAL", c: "#10B981" };

        /* ── RENDER ENGINE ── */
        function renderCards() {
            const grid = document.getElementById('device-grid');
            
            // Lọc và sắp xếp (Ưu tiên online lên đầu)
            const sortedNodes = [...NODE_IDS].sort((a, b) => {
                return (isStale(latestData[a]?.receivedAt) ? 1 : 0) - (isStale(latestData[b]?.receivedAt) ? 1 : 0);
            });

            grid.innerHTML = sortedNodes.map(id => {
                const data = latestData[id];
                if (!data) return '';

                const stale = isStale(data.receivedAt);
                const st = getStatus(data.temperature);
                const nc = COLORS[id];

                // Logic tạo màu và CSS tương ứng
                const bgClass = stale ? 'bg-staleBg opacity-50 grayscale' : 'bg-cardBg shadow-[0_8px_32px_rgba(0,0,0,0.4)]';
                const dotHtml = stale 
                    ? `<span class="w-2.5 h-2.5 rounded-full bg-slate-600 inline-block"></span>`
                    : `<span class="relative flex w-2.5 h-2.5"><span class="animate-iotping absolute inline-flex h-full w-full rounded-full bg-emerald-500 opacity-75"></span><span class="relative inline-flex rounded-full w-2.5 h-2.5 bg-emerald-500"></span></span>`;

                return `
                <div class="relative rounded-2xl overflow-hidden border ${stale ? 'border-slate-700' : 'border-white/10'} ${bgClass} transition-all duration-300">
                    <div class="absolute top-0 left-0 right-0 h-0.5" style="background: ${stale ? '#1E293B' : `linear-gradient(90deg, ${nc}, transparent)`}"></div>
                    
                    <div class="flex justify-between items-center px-4 py-3">
                        <div class="flex items-center gap-2">
                            ${dotHtml}
                            <span class="text-[13px] font-black text-slate-200 tracking-wide">${data.nodeId}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-black tracking-widest px-1.5 py-0.5 rounded border" 
                                  style="color: ${st.c}; background: ${st.c}22; border-color: ${st.c}44">${st.l}</span>
                            <i data-lucide="${stale ? 'wifi-off' : 'wifi'}" class="w-3.5 h-3.5" style="color: ${stale ? '#475569' : nc}"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-2 px-3.5 pb-3.5">
                        <div class="flex flex-col gap-1 rounded-lg px-3 py-2 bg-white/5 border border-white/5">
                            <div class="flex items-center gap-1.5" style="color: ${st.c}">
                                <i data-lucide="thermometer" class="w-3 h-3"></i><span class="text-[9px] font-bold tracking-widest uppercase">Temp</span>
                            </div>
                            <span class="text-base font-black text-slate-200 font-mono leading-none">${data.temperature}<span class="text-[10px] font-normal text-slate-500 ml-0.5">°C</span></span>
                        </div>
                        <div class="flex flex-col gap-1 rounded-lg px-3 py-2 bg-white/5 border border-white/5">
                            <div class="flex items-center gap-1.5 text-sky-400">
                                <i data-lucide="droplets" class="w-3 h-3"></i><span class="text-[9px] font-bold tracking-widest uppercase">Humidity</span>
                            </div>
                            <span class="text-base font-black text-slate-200 font-mono leading-none">${data.humidity}<span class="text-[10px] font-normal text-slate-500 ml-0.5">%</span></span>
                        </div>
                        <div class="flex flex-col gap-1 rounded-lg px-3 py-2 bg-white/5 border border-white/5">
                            <div class="flex items-center gap-1.5 text-amber-500">
                                <i data-lucide="zap" class="w-3 h-3"></i><span class="text-[9px] font-bold tracking-widest uppercase">ADC Raw</span>
                            </div>
                            <span class="text-base font-black text-slate-200 font-mono leading-none">${data.adcRaw}<span class="text-[10px] font-normal text-slate-500 ml-0.5">LSB</span></span>
                        </div>
                        <div class="flex flex-col gap-1 rounded-lg px-3 py-2 bg-white/5 border border-white/5">
                            <div class="flex items-center gap-1.5 text-indigo-400">
                                <i data-lucide="trending-up" class="w-3 h-3"></i><span class="text-[9px] font-bold tracking-widest uppercase">Avg Temp</span>
                            </div>
                            <span class="text-base font-black text-slate-200 font-mono leading-none">${data.windowAvgTemperature}<span class="text-[10px] font-normal text-slate-500 ml-0.5">°C</span></span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center px-3.5 py-1.5 border-t border-white/5">
                        <span class="text-[10px] text-slate-500 flex items-center gap-1"><i data-lucide="clock" class="w-2.5 h-2.5"></i> ${fmtTime(data.receivedAt)}</span>
                        <span class="text-[10px] text-[#283450] font-mono font-bold">SEQ #${data.sequenceNumber}</span>
                    </div>
                </div>`;
            }).join('');

            // Kích hoạt lại Lucide Icons cho các thẻ vừa tạo
            lucide.createIcons();
        }

        /* ── UPDATE PIPELINE ── */
        function processBuffer() {
            if (Object.keys(buffer).length === 0) return;

            const now = new Date().toISOString();
            
            // 1. Update Latest Data
            Object.entries(buffer).forEach(([id, val]) => {
                latestData[id] = val;
            });

            // 2. Update Header KPIs
            let onlineCount = 0;
            let isDegraded = false;
            NODE_IDS.forEach(id => {
                if (latestData[id]) {
                    if (!isStale(latestData[id].receivedAt)) onlineCount++;
                    if (latestData[id].temperature > 32) isDegraded = true;
                }
            });

            document.getElementById('kpi-online').innerText = `${onlineCount}/${NODE_IDS.length}`;
            document.getElementById('kpi-time').innerText = fmtTime(now);
            
            const healthBox = document.getElementById('kpi-health-box');
            const healthIcon = document.getElementById('kpi-health-icon');
            const healthText = document.getElementById('kpi-health');

            if (isDegraded) {
                healthBox.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-500/10 border border-amber-500/20";
                healthIcon.setAttribute('data-lucide', 'alert-circle');
                healthIcon.className = "w-3.5 h-3.5 text-amber-500";
                healthText.className = "text-xs font-black text-amber-500 font-mono";
                healthText.innerText = "DEGRADED";
            } else {
                healthBox.className = "flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20";
                healthIcon.setAttribute('data-lucide', 'check-circle-2');
                healthIcon.className = "w-3.5 h-3.5 text-emerald-500";
                healthText.className = "text-xs font-black text-emerald-500 font-mono";
                healthText.innerText = "HEALTHY";
            }

            // 3. Update Chart
            chart.data.labels.push(fmtTime(now));
            if (chart.data.labels.length > HISTORY_WINDOW) chart.data.labels.shift();

            NODE_IDS.forEach((id, index) => {
                const temp = buffer[id] ? buffer[id].temperature : (latestData[id] ? latestData[id].temperature : null);
                chart.data.datasets[index].data.push(temp);
                if (chart.data.datasets[index].data.length > HISTORY_WINDOW) {
                    chart.data.datasets[index].data.shift();
                }
            });

            chart.update();
            
            // 4. Update UI Grid
            renderCards();

            // Clear buffer
            for(let key in buffer) delete buffer[key];
        }

        /* ── MÔ PHỎNG LUỒNG WEBSOCKET ── */
        // Khởi tạo data ban đầu
        NODE_IDS.forEach(id => { latestData[id] = gen(id); });
        renderCards();

        // Giả lập nhận dữ liệu mỗi 150ms
        let idx = 0;
        setInterval(() => {
            const id = NODE_IDS[idx % NODE_IDS.length];
            buffer[id] = gen(id);
            idx++;
        }, 150);

        // Chạy quy trình xả buffer lên UI mỗi 1000ms
        setInterval(processBuffer, 1000);

        // Khởi tạo Icon lần đầu
        lucide.createIcons();

    </script>
</body>
</html>
